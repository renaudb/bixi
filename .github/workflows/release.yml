name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version part to bump"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install bump-my-version
        run: python -m pip install --upgrade bump-my-version

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        id: bump
        run: |
          current_version=$(grep -oP '(?<=__version__ = ")[^"]+' bixi/__init__.py)
          bump-my-version bump ${{ inputs.bump }} --current-version "$current_version"
          new_version=$(grep -oP '(?<=__version__ = ")[^"]+' bixi/__init__.py)
          echo "new_version=$new_version" >> "$GITHUB_OUTPUT"

      - name: Push commit and tag
        run: git push --follow-tags

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.bump.outputs.new_version }}
          generate_release_notes: true
